name: CI/CD

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/amirmghanem/kfit-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        with:
          host: 51.77.210.3
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,ACTOR
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            docker pull ghcr.io/amirmghanem/kfit-backend:latest
            docker compose -f ~/kfit/docker-compose.yml up -d --no-deps --force-recreate backend
            docker compose -f ~/kfit/docker-compose.yml exec -T backend alembic upgrade head
